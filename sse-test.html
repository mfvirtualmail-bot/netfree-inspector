<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NetFree Inspector — SSE stream test</title>
  <style>
    :root { color-scheme: light dark; }
    body { font: 14px/1.5 system-ui, "Segoe UI", sans-serif; margin: 0; padding: 20px;
           background: #0F172A; color: #E2E8F0; }
    h1 { font-size: 17px; margin: 0 0 4px; }
    .sub { color: #94A3B8; font-size: 12.5px; margin: 0 0 16px; }
    button { border: none; border-radius: 8px; padding: 10px 18px; font: 700 13px system-ui;
             background: #2563EB; color: #fff; cursor: pointer; margin-right: 8px; }
    button:disabled { opacity: .5; cursor: default; }
    #verdict { font-weight: 800; font-size: 16px; margin: 14px 0; }
    .ok { color: #4ADE80; } .bad { color: #F87171; } .wait { color: #FBBF24; }
    #log { background: #020617; border: 1px solid #1E293B; border-radius: 8px; padding: 12px;
           font: 12px/1.45 ui-monospace, Consolas, monospace; white-space: pre-wrap;
           max-height: 60vh; overflow: auto; margin-top: 14px; }
    a { color: #60A5FA; word-break: break-all; }
  </style>
</head>
<body>
  <h1>NetFree Inspector — real-stream (SSE) test</h1>
  <p class="sub">Confirms the extension can read NetFree's own event stream and set the required
    <code>Origin</code> header via declarativeNetRequest. Must be run on a device behind the NetFree filter.</p>
  <button id="run">Run test (stream 8s → build → upload)</button>
  <button id="streamOnly">Stream only (no upload)</button>
  <button id="diag">Show last recording diagnostics</button>
  <div id="verdict" class="wait">idle</div>
  <div id="log"></div>
  <script src="sse-recording.js"></script>
  <script src="sse-test.js"></script>
</body>
</html>
