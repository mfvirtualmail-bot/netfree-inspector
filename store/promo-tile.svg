<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="440" height="280" viewBox="0 0 440 280" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <!-- ==========  DEFINITIONS  ========== -->
  <defs>
    <!-- Main blue gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0845C8"/>
      <stop offset="55%" stop-color="#1A6DFF"/>
      <stop offset="100%" stop-color="#3B8BFF"/>
    </linearGradient>

    <!-- Subtle radial highlight -->
    <radialGradient id="highlight" cx="30%" cy="20%" r="80%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <!-- Glow behind shield -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for text -->
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5"/>
      <feOffset dx="0" dy="1" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ==========  BACKGROUND  ========== -->
  <rect width="440" height="280" fill="url(#bgGradient)"/>
  <rect width="440" height="280" fill="url(#highlight)"/>

  <!-- Decorative circles -->
  <circle cx="400" cy="40" r="80" fill="#FFFFFF" opacity="0.05"/>
  <circle cx="40"  cy="260" r="60" fill="#FFFFFF" opacity="0.05"/>

  <!-- ==========  SHIELD ICON  ========== -->
  <g transform="translate(40, 70)" filter="url(#glow)">
    <!-- Shield body -->
    <path d="M 70 0
             L 140 18
             L 140 70
             Q 140 130 70 155
             Q 0 130 0 70
             L 0 18 Z"
          fill="#FFFFFF"
          opacity="0.96"/>
    <!-- Check-mark inside shield -->
    <path d="M 40 75 L 60 95 L 105 50"
          stroke="#1A6DFF"
          stroke-width="11"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- ==========  TEXT BLOCK  ========== -->
  <g filter="url(#textShadow)">
    <!-- Main title -->
    <text x="210" y="85"
          fill="#FFFFFF"
          font-size="34"
          font-weight="800"
          letter-spacing="-0.5">NetFree</text>

    <text x="210" y="122"
          fill="#FFFFFF"
          font-size="30"
          font-weight="700"
          letter-spacing="0.2"
          opacity="0.96">Inspector</text>

    <!-- Tagline Hebrew -->
    <text x="210" y="158"
          fill="#FFFFFF"
          font-size="13"
          font-weight="500"
          opacity="0.92">גלה חסימות בכל דף באחת</text>

    <!-- Tagline English -->
    <text x="210" y="176"
          fill="#FFFFFF"
          font-size="11"
          font-weight="400"
          opacity="0.78">Detect blocks on any page instantly</text>
  </g>

  <!-- ==========  BLOCK TYPE BADGES  ========== -->
  <g transform="translate(210, 200)">
    <!-- Badge 1: Blacklisted -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="48" height="22" rx="11" fill="#FFFFFF" opacity="0.18"/>
      <text x="24" y="15" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">🚫</text>
    </g>

    <!-- Badge 2: Not whitelisted -->
    <g transform="translate(54, 0)">
      <rect x="0" y="0" width="48" height="22" rx="11" fill="#FFFFFF" opacity="0.18"/>
      <text x="24" y="15" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">⏳</text>
    </g>

    <!-- Badge 3: User settings -->
    <g transform="translate(108, 0)">
      <rect x="0" y="0" width="48" height="22" rx="11" fill="#FFFFFF" opacity="0.18"/>
      <text x="24" y="15" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">⚙️</text>
    </g>

    <!-- Badge 4: Third party -->
    <g transform="translate(162, 0)">
      <rect x="0" y="0" width="48" height="22" rx="11" fill="#FFFFFF" opacity="0.18"/>
      <text x="24" y="15" font-size="11" font-weight="700" fill="#FFFFFF" text-anchor="middle">❓</text>
    </g>
  </g>

  <!-- ==========  BOTTOM BAR  ========== -->
  <rect x="0" y="274" width="440" height="6" fill="#FFFFFF" opacity="0.3"/>
</svg>
