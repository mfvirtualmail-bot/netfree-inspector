<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetFree Inspector</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-brand">
        <img
          id="nf-logo"
          src="https://netfree.link/img/logo/netfree_logo.svg"
          alt="NetFree"
          class="nf-logo"
          onerror="this.style.display='none';document.getElementById('nf-logo-text').style.display='flex'"
        />
        <span id="nf-logo-text" class="nf-logo-text" style="display:none">
          <span class="logo-net">Net</span><span class="logo-free">Free</span>
        </span>
        <div class="header-separator"></div>
        <span class="header-subtitle" id="hdr-subtitle">בודק חסימות</span>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="optionsBtn" title="Options" aria-label="Options">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button class="lang-btn" id="langBtn" title="Switch language">EN</button>
      </div>
    </header>

    <!-- ── Current page pill ── -->
    <div class="page-bar">
      <span class="page-bar-dot"></span>
      <span class="page-bar-domain" id="pageDomain">…</span>
    </div>

    <!-- ── Summary banner ── -->
    <div class="summary" id="summary">
      <span class="summary-icon" id="summaryIcon">⏳</span>
      <div class="summary-body">
        <div class="summary-title" id="summaryTitle" data-he="בודק…" data-en="Checking…">בודק…</div>
        <div class="summary-sub"  id="summarySub"></div>
      </div>
    </div>

    <!-- ── Single page-level "Open NetFree Request" button ── -->
    <button class="page-ticket-btn" id="pageTicketBtn" type="button" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      <span id="pageTicketLabel">Open NetFree Request ↗</span>
    </button>

    <!-- ── Scrollable block list ── -->
    <div class="blocks-list" id="blocksList"></div>

    <!-- ── Screen recording (page-independent: records wherever you go) ── -->
    <div class="screen-rec-zone" id="screenRecZone">
      <button class="screen-rec-btn" id="screenRecBtn" type="button">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        <span id="screenRecLabel" data-he="הקלט מסך" data-en="Record screen">Record screen</span>
      </button>
      <div class="screen-rec-active" id="screenRecActive" hidden>
        <span class="rec-dot"></span>
        <div class="rec-info">
          <span class="rec-title" id="screenRecTitle">Recording screen…</span>
          <span class="rec-time" id="screenRecTime"></span>
        </div>
        <button class="rec-stop-btn" id="screenRecStopBtn" type="button" data-he="עצור ושלח" data-en="Stop &amp; send">Stop &amp; send</button>
      </div>
    </div>

    <!-- ── Footer actions ── -->
    <footer class="footer">
      <button class="footer-btn primary" id="reloadBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span id="lbl-reload" data-he="רענן ורשום" data-en="Reload &amp; Record">רענן ורשום</span>
      </button>
      <div class="footer-mini-actions">
        <button class="icon-btn" id="harmlessBtn" title="Show ad/tracker blocks" aria-label="Toggle ad/tracker blocks" aria-pressed="false">
          <svg class="icon-eye" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="icon-eye-off" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          <span class="icon-badge" id="harmlessCount" hidden></span>
        </button>
        <button class="icon-btn" id="reportBtn" title="Copy report" aria-label="Copy report">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </button>
        <button class="icon-btn" id="copyAllBtn" title="Copy all URLs" aria-label="Copy all URLs">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        </button>
      </div>
    </footer>

  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="traffic-recording.js"></script>
  <script src="popup.js"></script>
</body>
</html>
