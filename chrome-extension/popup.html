<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetFree Inspector</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header-brand">
        <img
          id="nf-logo"
          src="https://netfree.link/img/logo/netfree_logo.svg"
          alt="NetFree"
          class="nf-logo"
          onerror="this.style.display='none';document.getElementById('nf-logo-text').style.display='flex'"
        />
        <span id="nf-logo-text" class="nf-logo-text" style="display:none">
          <span class="logo-net">Net</span><span class="logo-free">Free</span>
        </span>
        <div class="header-separator"></div>
        <span class="header-subtitle" id="hdr-subtitle">בודק חסימות</span>
      </div>
      <button class="lang-btn" id="langBtn" title="Switch language">EN</button>
    </header>

    <!-- ── Current page pill ── -->
    <div class="page-bar">
      <span class="page-bar-dot"></span>
      <span class="page-bar-domain" id="pageDomain">…</span>
    </div>

    <!-- ── Summary banner ── -->
    <div class="summary" id="summary">
      <span class="summary-icon" id="summaryIcon">⏳</span>
      <div class="summary-body">
        <div class="summary-title" id="summaryTitle" data-he="בודק…" data-en="Checking…">בודק…</div>
        <div class="summary-sub"  id="summarySub"></div>
      </div>
    </div>

    <!-- ── Harmless-blocks toggle ── -->
    <div class="harmless-bar" id="harmlessBar" style="display:none">
      <label class="harmless-toggle">
        <input type="checkbox" id="harmlessToggle" />
        <span class="harmless-slider"></span>
        <span class="harmless-label" id="harmlessLabel"
              data-he="הצג חסימות פרסומות/מעקב"
              data-en="Show ad &amp; tracker blocks">
          הצג חסימות פרסומות/מעקב
        </span>
      </label>
      <span class="harmless-count" id="harmlessCount"></span>
    </div>

    <!-- ── Scrollable block list ── -->
    <div class="blocks-list" id="blocksList"></div>

    <!-- ── Footer actions ── -->
    <footer class="footer">
      <button class="footer-btn secondary" id="reloadBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
        <span id="lbl-reload" data-he="רענן ורשום" data-en="Reload &amp; Record">רענן ורשום</span>
      </button>
      <button class="footer-btn primary" id="copyAllBtn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        <span id="lbl-copy" data-he="העתק הכל" data-en="Copy All">העתק הכל</span>
      </button>
    </footer>

  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
