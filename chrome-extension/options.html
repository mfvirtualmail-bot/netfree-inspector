<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NetFree Inspector — הגדרות</title>
<style>
  :root {
    --brand: #1a6dff;
    --text: #0f172a;
    --muted: #475569;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --danger: #dc2626;
    --r: 10px;
  }
  * { box-sizing: border-box; }
  html[lang="en"] body { direction: ltr; }
  body {
    font-family: -apple-system, Segoe UI, Heebo, Arial, sans-serif;
    background: var(--bg); color: var(--text); margin: 0;
    padding: 32px 20px; line-height: 1.5;
  }
  .wrap { max-width: 680px; margin: 0 auto; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  h1 { font-size: 22px; margin: 0; }
  .lang-btn {
    background: white; border: 1px solid var(--border); border-radius: 999px;
    padding: 4px 12px; font-size: 12px; font-weight: 700; cursor: pointer;
    color: var(--muted);
  }
  section {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    padding: 20px; margin-bottom: 16px;
  }
  h2 { font-size: 15px; margin: 0 0 6px; }
  p.hint { color: var(--muted); font-size: 13px; margin: 0 0 12px; }

  textarea {
    width: 100%; min-height: 140px; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
    resize: vertical;
  }
  textarea:focus { outline: 2px solid var(--brand); outline-offset: -1px; }

  .row { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
  button.action {
    background: var(--brand); color: white; border: none;
    padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer;
    font-size: 13px;
  }
  button.action:hover { background: #1456cc; }
  button.ghost {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px;
    cursor: pointer; font-size: 13px;
  }
  button.ghost:hover { color: var(--text); background: white; }

  .status {
    color: #16a34a; font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity .2s;
  }
  .status.visible { opacity: 1; }

  .stat-row { display: flex; justify-content: space-between;
              padding: 6px 0; border-bottom: 1px dashed var(--border); font-size: 13px; }
  .stat-row:last-child { border-bottom: none; }
  .stat-row b { font-family: 'SF Mono', monospace; }
</style>
</head>
<body>
  <div class="wrap">

    <header>
      <h1 data-he="NetFree Inspector — הגדרות" data-en="NetFree Inspector — Settings">NetFree Inspector — הגדרות</h1>
      <button class="lang-btn" id="langBtn" type="button">EN</button>
    </header>

    <!-- ── Custom exclusions ── -->
    <section>
      <h2 data-he="רשימת החסמות שאני רוצה להסתיר" data-en="My custom harmless list">רשימת החסמות שאני רוצה להסתיר</h2>
      <p class="hint"
         data-he="הזן דומיין אחד לשורה. חסימות של דומיינים אלה יסווגו כ'לא משמעותיות' ויוסתרו כברירת מחדל. התאמה היא סיומת — 'example.com' יתפוס גם 'sub.example.com'."
         data-en="One domain per line. Blocks on these domains are treated as 'not meaningful' and hidden by default. Matching is suffix-based — 'example.com' also matches 'sub.example.com'.">
        הזן דומיין אחד לשורה.
      </p>
      <textarea id="userList" placeholder="ads.example.com&#10;tracker.example.net"></textarea>
      <div class="row">
        <button class="action" id="saveBtn" type="button" data-he="שמור" data-en="Save">שמור</button>
        <button class="ghost"  id="resetBtn" type="button" data-he="איפוס" data-en="Reset">איפוס</button>
        <span class="status" id="status" data-he="✓ נשמר" data-en="✓ Saved">✓ נשמר</span>
      </div>
    </section>

    <!-- ── Remote list info ── -->
    <section>
      <h2 data-he="רשימת פרסומות/מעקב משותפת" data-en="Shared ad &amp; tracker list">רשימת פרסומות/מעקב משותפת</h2>
      <p class="hint"
         data-he="רשימה מעודכנת אוטומטית אחת ליום מ-GitHub — בלי שתצטרך להתקין מחדש."
         data-en="Automatically refreshed once per day from GitHub — no re-install needed.">
        רשימה מעודכנת אוטומטית אחת ליום מ-GitHub.
      </p>
      <div class="stat-row">
        <span data-he="גרסת רשימה" data-en="List version">גרסת רשימה</span>
        <b id="remoteVersion">—</b>
      </div>
      <div class="stat-row">
        <span data-he="עדכון אחרון ברשימה" data-en="List updated">עדכון אחרון ברשימה</span>
        <b id="remoteUpdated">—</b>
      </div>
      <div class="stat-row">
        <span data-he="מספר דומיינים ברשימה המרוחקת" data-en="Remote domain count">מספר דומיינים ברשימה המרוחקת</span>
        <b id="remoteCount">—</b>
      </div>
      <div class="stat-row">
        <span data-he="נמשך לאחרונה" data-en="Last fetched">נמשך לאחרונה</span>
        <b id="remoteFetched">—</b>
      </div>
      <div class="row">
        <button class="ghost" id="refreshBtn" type="button"
                data-he="רענן עכשיו" data-en="Refresh now">רענן עכשיו</button>
      </div>
    </section>

    <!-- ── About ── -->
    <section>
      <h2 data-he="אודות" data-en="About">אודות</h2>
      <div class="stat-row">
        <span data-he="גרסה" data-en="Version">גרסה</span>
        <b id="extVersion">—</b>
      </div>
      <p class="hint" style="margin-top: 10px">
        <a href="https://mfvirtualmail-bot.github.io/beit-midrash-finance/netfree-inspector/" target="_blank"
           data-he="אתר הפרויקט ↗" data-en="Project website ↗">אתר הפרויקט ↗</a>
      </p>
    </section>

  </div>

  <script src="options.js"></script>
</body>
</html>
